[ns=Top Level Control]
description=The platform-specific details for the host where
           =the OASIS3-MCT and XIOS libraries and GC 
           =modules are to be created. 
sort-key=a1a

[template variables=HPC_HOST]
compulsory=true
description=HPC Host on which OASIS3-MCT will be built
help=These values correspond to those that can be found by running the command
    =cylc config --platforms.
ns=Top Level Control
sort-key=1
title=HPC Host
value-titles=EXZ Development system, EXAB Pair, EXCD Pair, EXA, EXB, EXC, EXD
values='login.exz', 'exab', 'excd', 'exa', 'exb', 'exc', 'exd'

[template variables=HPC_HOST_USERNAME]
compulsory=true
description=Username on the HPC host specified above
ns=Top Level Control
sort-key=1a
title=HPC Host Username
type=character

[template variables=XIOS_ONLY]
compulsory=true
description=Build XIOS without Oasis3-MCT. Will also produce an XIOS-PrgEnv module
ns=Top Level Control
sort-key=1b
title=XIOS only
help=When set to true, XIOS will be built without Oasis3-MCT. The XIOS module 
    =itself will be produced, along with a corresponding XIOS-PrgEnv module 
    =containing the compiler environment and appropriate NetCDF modules.
type=boolean
trigger=template variables=EXTRACT_OASIS: false;
       =template variables=BUILD_MCT: false;
       =template variables=BUILD_TEST: false;
       =template variables=OASIS_REPOSITORY: false;
       =template variables=OASIS_BRANCH: false;
       =template variables=PLATFORM_CONFIG: false;
       =template variables=OASIS_BUILD_DIR: false;
       =template variables=OASIS_MOD_NAME: false;
       =template variables=OASIS_MOD_VERSION: false;
       =template variables=GC_PRG_ENV_NAME: false;
       =template variables=GC_PRG_ENV_VERSION: false;
       =template variables=XIOS_PRG_ENV_NAME: true;
       =template variables=XIOS_PRG_ENV_VERSION: true;


[template variables=MODULE_CMD]
compulsory=true
description=Set up the environment on the HPC host
help=When running the builds it may be required to specify different compiler or
    =netcdf modules etc. on the HPC host. 
ns=Top Level Control
sort-key=2
title=Preloaded Modules
type=character

[ns=OASIS]
description=This window allows you to specify the options 
           =associated with building the OASIS3-MCT 
           =coupling libraries.
sort-key=a1b

[template variables=EXTRACT_OASIS]
compulsory=true
description=Extract OASIS3-MCT from GIT repository
help=Switch to extract OASIS3-MCT
ns=OASIS
sort-key=a0
title=Extract MCT
type=boolean
trigger=template variables=OASIS_REPOSITORY: true;
       =template variables=OASIS_BRANCH: true;
       =template variables=OASIS_WC_DIR: false;

[template variables=BUILD_MCT]
compulsory=true
description=Build OASIS3-MCT
help=Switch to enable the building of the 
    =OASIS3-MCT coupler libraries
ns=OASIS
sort-key=a1
title=Build MCT
type=boolean

[template variables=BUILD_TEST]
compulsory=true
description=Build OASIS3-MCT tutorial
help=Switch to include the build of the OASIS3-MCT 
    =tutorial in order to check the integrity of
    =the coupler library build.
ns=OASIS
sort-key=a2
title=Build Tutorial
type=boolean

[template variables=OASIS_WC_DIR]
compulsory=true
description=Path to working copy of OASIS-MCT source on local machine
help=Path to OASIS source on the local host, if not extracted from the
    =repository
ns=OASIS
sort-key=a21
title=OASIS Source directory
type=character

[template variables=OASIS_REPOSITORY]
compulsory=true
description=URL of the OASIS3-MCT repository
help=Location of the OASIS Git repository.
ns=OASIS
sort-key=a3
title=OASIS Repository
type=character

[template variables=OASIS_BRANCH]
compulsory=true
description=The branch to use within the Git Repository
help=The branch (or hash) of the OASIS Git repository from which 
    =to extract the OASIS3-MCT source code.
ns=OASIS
sort-key=a4
title=OASIS Branch
type=character

[template variables=PLATFORM_CONFIG]
compulsory=true
description=The config for the platform on which the code will be compiled.
help=The platform configuration in the OAIS3-MCT util/make_dir directory 
    =which will be used to build the code.
ns=OASIS
sort-key=a5
title=Platform Config
value-titles=make.crayEX
values='make.crayEX'

[template variables=OASIS_BUILD_DIR]
compulsory=true
description=Where to find the OASIS libraries and mod file for module creation
help=
ns=OASIS
sort-key=b1
title=Build directory
value-titles=crayEX
values='crayEX'

[ns=Modules]
description=This window allows you to specify the naming details for libraries 
           =and modules which are to be generated by this suite.
           =
           =Separate names are specified for OASIS3-MCT, XIOS
           =and the resulting GC module which will contain them.
sort-key=a1d

[template variables=OASIS_MOD_NAME]
compulsory=true
description=Name of the OASIS3-MCT module to be created
help=The name you want to be applied to the 
     OASIS3-MCT module build.
     (Spaces or special characters should not be used!)
ns=Modules
sort-key=moda1
title=OASIS Module name
type=character

[template variables=OASIS_MOD_VERSION]
compulsory=true
description=Version ID of the OASIS3-MCT module to be created
help=The version number or other identifier to be applied 
     to the OASIS3-MCT module build.
     (Spaces or special characters should not be used!)
ns=Modules
sort-key=moda2
title=OASIS Module version
type=character

[ns=XIOS]
description=Details of the XIOS source code to be
           =used in building the XIOS libraries and modules
           =created by this suite. 
sort-key=a1c

[template variables=XIOS_GIT]
compulsory=true
description=Build XIOS from Git repository
ns=XIOS
sort-key=a0
title=XIOS Git
type=boolean
trigger=template variables=XIOS_URL: false;
       =template variables=XIOS_REV: false;
       =template variables=XIOS_GIT_REPOSITORY: true;
       =template variables=XIOS_HASH: true;

[template variables=XIOS_GIT_REPOSITORY]
compulsory=true
description=Path to XIOS git repository
help=Location of the XIOS git repository. This may point to Gitlab or to a
    =local clone
ns=XIOS
sort-key=a1
title=XIOS Git location
type=character

[template variables=XIOS_HASH]
compulsory=true
description=Hash of XIOS git repsitory to use
ns=XIOS
sort-key=a2
title=XIOS Hash
type=character

[template variables=XIOS_URL]
compulsory=true
description=URL of the XIOS repository
help=Location of the XIOS repository. This may point to a mirror
    =of the repository.
ns=XIOS
sort-key=a1
title=XIOS Repository
type=character

[template variables=XIOS_VERSION]
compulsory=true
description=Location of XIOS (trunk/branch)
help=Location of XIOS in the repository. 
    =This may be the trunk or a path to a branch within 
    =the repository
ns=XIOS
sort-key=a2
title=XIOS Version
type=character

[template variables=XIOS_REV]
compulsory=true
description=Revision of XIOS to use
help=Enter the XIOS repository revison number to 
    =be used in the XIOS build. 
ns=XIOS
sort-key=a3
title=XIOS Revision

[template variables=XIOS_MOD_NAME]
compulsory=true
description=Name of the XIOS-MCT module to be created
help=The name to apply to the XIOS module
    =created by this suite. 
    =(Spaces or special characters should not be used!)
ns=Modules
sort-key=modb1
title=XIOS Module name
type=character

[template variables=XIOS_MOD_VERSION]
compulsory=true
description=Version ID of the XIOS module to be created
help=Version number or other identifier to apply to 
    =the XIOS module created by this suite. 
    =(Spaces or special characters should not be used!)
ns=Modules
sort-key=modb2
title=XIOS Module version
type=character

[template variables=XIOS_PRG_ENV_NAME]
compulsory=true
description=Name of the XIOS programming environment module to be created
help=Enter the name you wish to give to the XIOS
    =programming environment created by this suite
    =(Spaces or special characters should not be used!)
ns=Modules
sort-key=modc1
title=XIOS-PrgEnv Module name
type=character

[template variables=XIOS_PRG_ENV_VERSION]
compulsory=true
description=Version ID of the XIOS module to be created
help=Version number or other identifier to apply to 
    =the XIOS module created by this suite.
    =(Spaces or special characters should not be used!)
ns=Modules
sort-key=modc2
title=XIOS-PrgEnv Module version
type=character

[template variables=GC_PRG_ENV_NAME]
compulsory=true
description=Name of the GC programming environment module to be created
help=Enter the name you wish to give to the GC
    =programming environment created by this suite
    =(Spaces or special characters should not be used!)
ns=Modules
sort-key=modz1
title=GC Module name
type=character

[template variables=GC_PRG_ENV_VERSION]
compulsory=true
description=Version ID of the GC module to be created
help=Version number or other identifier to apply to 
    =the GC module created by this suite.
    =(Spaces or special characters should not be used!)
ns=Modules
sort-key=modz2
title=GC Module version
type=character
